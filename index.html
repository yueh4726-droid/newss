<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萊特權證日報</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Share+Tech+Mono&display=swap');
        :root { --bg: #0a0e14; --surface: #111620; --border: #1e2a3a; --accent: #00d4ff; --text: #e0eaf5; --muted: #5a7a99; --card: #131c28; --bull: #00e676; --bear: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; position: relative; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; position: relative; }
        
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .title-block h1 { font-size: 26px; color: var(--accent); text-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .date-badge { font-family: 'Share Tech Mono'; color: var(--accent); background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); padding: 6px 12px; border-radius: 4px; }

        .filter-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.2); }

        .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-card { background: var(--card); border: 1px solid var(--border); padding: 15px; text-align: center; border-radius: 6px; }
        .num { font-family: 'Share Tech Mono'; font-size: 28px; font-weight: 700; display: block; }
        .num.bull { color: var(--bull); } .num.bear { color: var(--bear); }

        .stock-card { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 8px; display: grid; grid-template-columns: 80px 1fr 100px; gap: 15px; margin-bottom: 10px; transition: 0.3s; }
        .stock-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .stock-id { font-family: 'Share Tech Mono'; color: var(--accent); font-size: 20px; font-weight: 700; }
        .stock-title a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 15px; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border); margin-right: 5px; background: rgba(255,255,255,0.03); }
        .badge { font-family: 'Share Tech Mono'; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-align: center; }
        .badge.bull { background: rgba(0,230,118,0.1); color: var(--bull); }
        .badge.bear { background: rgba(255,68,68,0.1); color: var(--bear); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="title-block">
            <h1>⚡ 權證標的日報</h1>
            <div style="font-family:'Share Tech Mono'; font-size:11px; color:var(--muted)">WARRANT SCANNER V2.0</div>
        </div>
        <div class="date-badge" id="dateBadge">SYNCING...</div>
    </header>

    <div class="filter-row">
        <button class="filter-btn active" onclick="filterData('all', this)">全部</button>
        <button class="filter-btn" onclick="filterData('bull', this)">▲ 認購(多)</button>
        <button class="filter-btn" onclick="filterData('bear', this)">▼ 認售(空)</button>
        <button class="filter-btn" onclick="filterData('udn', this)">經濟日報</button>
        <button class="filter-btn" onclick="filterData('ctee', this)">工商時報</button>
    </div>

    <div class="summary-row">
        <div class="summary-card"><span class="num bull" id="bullCount">0</span><span style="font-size:11px; color:var(--muted)">看多</span></div>
        <div class="summary-card"><span class="num bear" id="bearCount">0</span><span style="font-size:11px; color:var(--muted)">看空</span></div>
        <div class="summary-card"><span class="num" id="totalCount" style="color:var(--accent)">0</span><span style="font-size:11px; color:var(--muted)">總計</span></div>
    </div>

    <div id="stocksList"></div>
</div>

<script>
    let allData = [];

    async function loadData() {
        try {
            const res = await fetch('./data.json?t=' + Date.now());
            const data = await res.json();
            allData = data.stocks;
            document.getElementById('dateBadge').textContent = data.lastUpdate;
            updateUI(allData);
        } catch(e) {
            document.getElementById('stocksList').innerHTML = '<div style="text-align:center;color:var(--muted);padding:50px;">還沒產出今日數據，請等候早上 07:00 更新</div>';
        }
    }

    function updateUI(stocks) {
        document.getElementById('bullCount').textContent = stocks.filter(s => s.direction === 'bull').length;
        document.getElementById('bearCount').textContent = stocks.filter(s => s.direction === 'bear').length;
        document.getElementById('totalCount').textContent = stocks.length;

        const list = document.getElementById('stocksList');
        list.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <div><div class="stock-id">${s.id}</div><div style="font-size:11px;color:var(--muted)">${s.name}</div></div>
                <div>
                    <div class="stock-title"><a href="${s.link}" target="_blank">${s.title}</a></div>
                    <div style="font-size:12px;color:var(--muted);margin:5px 0;">${s.reason}</div>
                    <div>
                        <span class="tag" style="color:${s.direction==='bull'?'var(--bull)':'var(--bear)'}">${s.direction==='bull'?'▲ 認購':'▼ 認售'}</span>
                        <span class="tag">${s.sourceName}</span>
                    </div>
                </div>
                <div style="text-align:right">
                    <div class="badge ${s.direction}">${s.direction==='bull'?'CALL':'PUT'}</div>
                    <div style="font-family:'Share Tech Mono';font-size:10px;color:var(--muted);margin-top:10px;">${s.date} ${s.time}</div>
                </div>
            </div>
        `).join('');
    }

    function filterData(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        let filtered = allData;
        if(type === 'bull' || type === 'bear') filtered = allData.filter(s => s.direction === type);
        else if(type === 'udn' || type === 'ctee') filtered = allData.filter(s => s.source === type);
        
        updateUI(filtered);
    }

    window.onload = loadData;
</script>
</body>
</html>
