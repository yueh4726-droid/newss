<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>權證標的日報</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #121b2d;
    --panel-2: #17243a;
    --border: #24344f;
    --text: #e8eef8;
    --muted: #92a4bf;
    --accent: #39c6ff;
    --bull: #35d07f;
    --bear: #ff6b6b;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Noto Sans TC", sans-serif;
    background:
      radial-gradient(circle at top right, rgba(57, 198, 255, 0.14), transparent 30%),
      linear-gradient(180deg, #0b1220, #0a101c);
    color: var(--text);
    min-height: 100vh;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  .hero,
  .panel,
  .card {
    background: rgba(18, 27, 45, 0.95);
    border: 1px solid var(--border);
    border-radius: 18px;
  }

  .hero {
    padding: 24px;
    margin-bottom: 18px;
  }

  .hero h1 {
    font-size: 32px;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .hero p {
    color: var(--muted);
    line-height: 1.8;
  }

  .grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .panel {
    padding: 18px;
  }

  .panel h2 {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 0.08em;
  }

  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .field {
    flex: 1;
    min-width: 160px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  input,
  select,
  button {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel-2);
    color: var(--text);
    padding: 11px 12px;
    font-size: 14px;
  }

  button {
    cursor: pointer;
    transition: 0.2s ease;
    font-weight: 700;
  }

  button:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #1f8dff);
    color: #07101b;
    border: none;
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .card {
    padding: 18px;
  }

  .num {
    font-size: 30px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .bull { color: var(--bull); }
  .bear { color: var(--bear); }
  .accent { color: var(--accent); }

  .sub {
    font-size: 12px;
    color: var(--muted);
  }

  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .chip {
    width: auto;
    padding: 8px 14px;
    border-radius: 999px;
  }

  .chip.active {
    background: rgba(57, 198, 255, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .item {
    background: rgba(23, 36, 58, 0.92);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: grid;
    grid-template-columns: 110px 1fr 110px;
    gap: 14px;
    align-items: start;
  }

  .code {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }

  .name {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .reason {
    color: #c9d5e8;
    line-height: 1.8;
    font-size: 14px;
  }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .tag {
    font-size: 11px;
    border-radius: 999px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .tag.bull {
    color: var(--bull);
    border-color: rgba(53, 208, 127, 0.35);
    background: rgba(53, 208, 127, 0.08);
  }

  .tag.bear {
    color: var(--bear);
    border-color: rgba(255, 107, 107, 0.35);
    background: rgba(255, 107, 107, 0.08);
  }

  .side {
    text-align: right;
  }

  .badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }

  .badge.bull {
    background: rgba(53, 208, 127, 0.1);
  }

  .badge.bear {
    background: rgba(255, 107, 107, 0.1);
  }

  .time {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .empty {
    padding: 48px 16px;
    text-align: center;
    color: var(--muted);
    background: rgba(18, 27, 45, 0.65);
    border: 1px dashed var(--border);
    border-radius: 18px;
  }

  .note {
    margin-top: 18px;
    color: var(--muted);
    line-height: 1.8;
    font-size: 13px;
  }

  @media (max-width: 860px) {
    .grid,
    .stats {
      grid-template-columns: 1fr;
    }

    .item {
      grid-template-columns: 1fr;
    }

    .side {
      text-align: left;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>權證標的日報</h1>
    <p>這是可直接放上 GitHub Pages 的純前端版本，不用 API、不用後端。你只要每天把資料補進下方的 `dailyData` 陣列，就能依日期、方向、來源搜尋每天的資料。</p>
  </section>

  <section class="grid">
    <div class="panel">
      <h2>搜尋條件</h2>
      <div class="row">
        <div class="field">
          <label for="dateSelect">日期</label>
          <select id="dateSelect"></select>
        </div>
        <div class="field">
          <label for="directionSelect">方向</label>
          <select id="directionSelect">
            <option value="all">全部</option>
            <option value="bull">看多</option>
            <option value="bear">看空</option>
          </select>
        </div>
        <div class="field">
          <label for="sourceSelect">來源</label>
          <select id="sourceSelect">
            <option value="all">全部</option>
            <option value="udn">經濟日報</option>
            <option value="ctee">工商時報</option>
            <option value="broker">券商推薦</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="field">
          <label for="keywordInput">關鍵字</label>
          <input id="keywordInput" type="text" placeholder="輸入股票代號或公司名稱">
        </div>
      </div>

      <div class="btn-group">
        <button class="btn-primary" type="button" onclick="applyFilters()">搜尋資料</button>
        <button type="button" onclick="resetFilters()">重設條件</button>
      </div>
    </div>

    <div class="panel">
      <h2>每天更新方式</h2>
      <div class="note">
        1. 打開這個 HTML
        <br>
        2. 找到 `dailyData`
        <br>
        3. 新增一筆新的日期資料
        <br>
        4. commit 到 GitHub
        <br>
        5. GitHub Pages 就會直接更新
      </div>
    </div>
  </section>

  <section class="stats">
    <div class="card">
      <div class="num accent" id="totalCount">0</div>
      <div class="sub">總筆數</div>
    </div>
    <div class="card">
      <div class="num bull" id="bullCount">0</div>
      <div class="sub">看多</div>
    </div>
    <div class="card">
      <div class="num bear" id="bearCount">0</div>
      <div class="sub">看空</div>
    </div>
    <div class="card">
      <div class="num accent" id="dateCount">0</div>
      <div class="sub">資料天數</div>
    </div>
  </section>

  <section class="toolbar" id="dateChips"></section>
  <section class="list" id="resultList"></section>
</div>

<script>
const dailyData = [
  {
    date: "2026-04-23",
    stocks: [
      {
        id: "2330",
        name: "台積電",
        direction: "bull",
        title: "AI 需求續強",
        reason: "先進製程需求穩健，權證偏多操作升溫。",
        source: "udn",
        sourceName: "經濟日報",
        time: "08:35"
      },
      {
        id: "2454",
        name: "聯發科",
        direction: "bull",
        title: "手機晶片題材延續",
        reason: "高階晶片與 AI 邊緣運算題材受市場關注。",
        source: "ctee",
        sourceName: "工商時報",
        time: "09:10"
      },
      {
        id: "2317",
        name: "鴻海",
        direction: "bear",
        title: "短線震盪加劇",
        reason: "短線漲多後震盪，市場轉向保守避險。",
        source: "broker",
        sourceName: "券商推薦",
        time: "10:05"
      }
    ]
  },
  {
    date: "2026-04-22",
    stocks: [
      {
        id: "2382",
        name: "廣達",
        direction: "bull",
        title: "伺服器概念續熱",
        reason: "AI 伺服器需求成長，帶動市場偏多解讀。",
        source: "udn",
        sourceName: "經濟日報",
        time: "08:20"
      },
      {
        id: "2308",
        name: "台達電",
        direction: "bull",
        title: "電源管理受青睞",
        reason: "受惠資料中心與電動車題材，權證買盤升溫。",
        source: "broker",
        sourceName: "券商推薦",
        time: "11:00"
      }
    ]
  },
  {
    date: "2026-04-21",
    stocks: [
      {
        id: "2603",
        name: "長榮",
        direction: "bear",
        title: "運價波動觀望",
        reason: "航運族群短線觀望，市場偏向保守操作。",
        source: "ctee",
        sourceName: "工商時報",
        time: "09:45"
      }
    ]
  }
];

let activeChipDate = "all";

function getAllStocks() {
  return dailyData.flatMap((day) =>
    day.stocks.map((stock) => ({
      ...stock,
      date: day.date
    }))
  );
}

function getDateOptions() {
  return dailyData.map((item) => item.date).sort().reverse();
}

function formatDate(dateString) {
  const date = new Date(dateString + "T00:00:00");
  const week = ["日", "一", "二", "三", "四", "五", "六"];
  return `${dateString} 週${week[date.getDay()]}`;
}

function sourceLabel(source) {
  if (source === "udn") return "經濟日報";
  if (source === "ctee") return "工商時報";
  return "券商推薦";
}

function init() {
  const dateSelect = document.getElementById("dateSelect");
  dateSelect.innerHTML = `<option value="all">全部日期</option>` +
    getDateOptions().map((date) => `<option value="${date}">${formatDate(date)}</option>`).join("");

  renderDateChips();
  applyFilters();
}

function renderDateChips() {
  const wrap = document.getElementById("dateChips");
  const dates = getDateOptions();

  wrap.innerHTML = `
    <button class="chip ${activeChipDate === "all" ? "active" : ""}" type="button" onclick="setChipDate('all')">全部日期</button>
    ${dates.map((date) => `
      <button class="chip ${activeChipDate === date ? "active" : ""}" type="button" onclick="setChipDate('${date}')">${date}</button>
    `).join("")}
  `;
}

function setChipDate(date) {
  activeChipDate = date;
  document.getElementById("dateSelect").value = date;
  renderDateChips();
  applyFilters();
}

function applyFilters() {
  const dateValue = document.getElementById("dateSelect").value;
  const directionValue = document.getElementById("directionSelect").value;
  const sourceValue = document.getElementById("sourceSelect").value;
  const keyword = document.getElementById("keywordInput").value.trim().toLowerCase();

  activeChipDate = dateValue;
  renderDateChips();

  let rows = getAllStocks();

  if (dateValue !== "all") {
    rows = rows.filter((item) => item.date === dateValue);
  }

  if (directionValue !== "all") {
    rows = rows.filter((item) => item.direction === directionValue);
  }

  if (sourceValue !== "all") {
    rows = rows.filter((item) => item.source === sourceValue);
  }

  if (keyword) {
    rows = rows.filter((item) =>
      item.id.includes(keyword) ||
      item.name.toLowerCase().includes(keyword) ||
      item.title.toLowerCase().includes(keyword)
    );
  }

  rows.sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return (a.time || "") < (b.time || "") ? 1 : -1;
  });

  renderStats(rows);
  renderList(rows);
}

function renderStats(rows) {
  document.getElementById("totalCount").textContent = rows.length;
  document.getElementById("bullCount").textContent = rows.filter((item) => item.direction === "bull").length;
  document.getElementById("bearCount").textContent = rows.filter((item) => item.direction === "bear").length;
  document.getElementById("dateCount").textContent = new Set(dailyData.map((item) => item.date)).size;
}

function renderList(rows) {
  const list = document.getElementById("resultList");

  if (!rows.length) {
    list.innerHTML = `<div class="empty">查無資料，請切換日期或搜尋條件。</div>`;
    return;
  }

  list.innerHTML = rows.map((item) => `
    <article class="item">
      <div>
        <div class="code">${item.id}</div>
        <div class="name">${item.name}</div>
      </div>
      <div>
        <div class="title">${item.title}</div>
        <div class="reason">${item.reason}</div>
        <div class="tags">
          <span class="tag ${item.direction}">${item.direction === "bull" ? "看多" : "看空"}</span>
          <span class="tag">${sourceLabel(item.source)}</span>
          <span class="tag">${item.date}</span>
        </div>
      </div>
      <div class="side">
        <span class="badge ${item.direction}">${item.direction === "bull" ? "CALL" : "PUT"}</span>
        <div class="time">${item.time || ""}</div>
      </div>
    </article>
  `).join("");
}

function resetFilters() {
  document.getElementById("dateSelect").value = "all";
  document.getElementById("directionSelect").value = "all";
  document.getElementById("sourceSelect").value = "all";
  document.getElementById("keywordInput").value = "";
  activeChipDate = "all";
  renderDateChips();
  applyFilters();
}

init();
</script>
</body>
</html>
